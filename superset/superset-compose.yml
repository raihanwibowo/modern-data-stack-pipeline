version: '3.8'

services:
  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: superset
    environment:
      - SUPERSET_SECRET_KEY=your_secret_key_change_this_in_production
    ports:
      - "8088:8088"
    volumes:
      - superset_home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py
      - ./requirements-extra.txt:/app/requirements-extra.txt
    deploy:
      resources:
        limits:
          cpus: '3'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G
    command: >
      bash -c "
      superset db upgrade &&
      (superset fab create-admin --username admin --firstname Admin --lastname User --email admin@superset.com --password admin || true) &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088 --with-threads --reload --debugger
      "
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - shared_data_network

networks:
  shared_data_network:
    external: true

volumes:
  superset_home:
    driver: local
